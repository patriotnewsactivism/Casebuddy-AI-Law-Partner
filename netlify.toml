[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Map /api/* paths to Netlify functions (mirrors Vercel edge function routing)
[[redirects]]
  from = "/api/ai/voice-keys-public"
  to = "/.netlify/functions/ai/voice-keys-public"
  status = 200

[[redirects]]
  from = "/api/ai/voice-keys"
  to = "/.netlify/functions/ai/voice-keys"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA catch-all — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
