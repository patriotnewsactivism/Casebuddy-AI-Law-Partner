[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/ai/voice-keys-public"
  to = "/.netlify/functions/voice-keys-public"
  status = 200
  force = true

[[redirects]]
  from = "/api/ai/voice-keys"
  to = "/.netlify/functions/voice-keys"
  status = 200
  force = true

[[redirects]]
  from = "/api/ai/gemini"
  to = "/.netlify/functions/gemini-chat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
