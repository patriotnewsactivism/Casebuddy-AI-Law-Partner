[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# SPA Routing: Redirect all requests to index.html so React Router can handle them.
# This prevents 404 errors on page refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API Redirection: Map /api routes to our Netlify functions.
[[redirects]]
  from = "/api/ai/orchestrate"
  to = "/.netlify/functions/orchestrate"
  status = 200

[[redirects]]
  from = "/api/ai/voice-keys"
  to = "/.netlify/functions/voice-keys"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
