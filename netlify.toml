[build]
  command = "npm run build"
  publish = "dist"

# SPA Routing: Redirect all requests to index.html so React Router can handle them.
# This prevents 404 errors on page refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API Redirection: Netlify doesn't natively handle the /api folder like Vercel.
# If you are using Netlify Functions, move the logic to netlify/functions.
# For now, we ensure these don't just 404 the whole app.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
